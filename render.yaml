# Render.com Blueprint 設定ファイル
# https://render.com/docs/blueprint-spec

services:
  # FastAPI + フロントエンド（StaticFiles でマウント）
  - type: web
    name: oripa-gacha
    runtime: python
    # ビルド時に実行するスクリプト
    buildCommand: bash build.sh
    # サーバー起動コマンド（PORT 環境変数は Render が自動でセットする）
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    # ヘルスチェックエンドポイント
    healthCheckPath: /health
    # 無料プランの設定
    plan: free
    # 環境変数（値は Render ダッシュボードで設定すること）
    envVars:
      - key: SECRET_KEY
        sync: false          # ダッシュボードで手動設定
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLIC_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false          # 例: https://oripa-gacha.onrender.com
      # Python の標準出力をバッファリングしない（ログをリアルタイムで確認するため）
      - key: PYTHONUNBUFFERED
        value: "1"
      # PostgreSQLデータベースの接続URL（Renderが自動的に接続文字列を注入する）
      - key: DATABASE_URL
        fromDatabase:
          name: oripa-gacha-db
          property: connectionString

# PostgreSQL データベース（Render managed DB）
databases:
  - name: oripa-gacha-db
    plan: free
    databaseName: oripa_gacha
    user: oripa_user

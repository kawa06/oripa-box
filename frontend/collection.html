<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>オリパガチャ - カード管理</title>
  <link rel="stylesheet" href="/frontend/css/style.css">
  <style>
    /* ===== チェックボックスのカスタムスタイル ===== */
    .card-checkbox-wrap {
      position: absolute;
      top: 8px;
      left: 8px;
      z-index: 10;
    }
    .card-checkbox {
      /* ブラウザデフォルトのチェックボックスを非表示 */
      appearance: none;
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-radius: 4px;
      background: rgba(0, 0, 0, 0.5);
      cursor: pointer;
      display: block;
      position: relative;
      transition: border-color 0.2s, background 0.2s;
    }
    .card-checkbox:checked {
      border-color: #f9d923;
      background: rgba(249, 217, 35, 0.25);
    }
    /* チェックマーク */
    .card-checkbox:checked::after {
      content: '';
      display: block;
      width: 5px;
      height: 9px;
      border: 2px solid #f9d923;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
      position: absolute;
      top: 2px;
      left: 5px;
    }

    /* ===== 選択状態のカードスタイル ===== */
    .collection-card {
      position: relative;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    .collection-card.card-selected {
      border-color: #f9d923 !important;
      background: rgba(249, 217, 35, 0.08) !important;
      box-shadow: 0 0 0 2px rgba(249, 217, 35, 0.4), 0 4px 16px rgba(249, 217, 35, 0.15) !important;
    }

    /* ===== 一括操作バー ===== */
    .bulk-action-bar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px 16px;
      background: var(--card-bg, #1e1b2e);
      border: 1px solid var(--border-color, #3a3a5c);
      border-radius: 10px;
      margin-bottom: 16px;
    }
    .bulk-action-bar .bulk-count {
      font-size: 0.9rem;
      color: var(--text-secondary, #a0aec0);
      margin-right: auto;
    }
    .bulk-action-bar .bulk-count span {
      color: #f9d923;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <!-- ナビゲーションバー -->
  <nav class="navbar">
    <a href="/frontend/index.html" class="navbar-brand">✦ オリパガチャ</a>
    <button class="hamburger" aria-label="メニューを開く" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <ul class="navbar-nav">
      <li><a href="/frontend/index.html">パック一覧</a></li>
      <li><a href="/frontend/gacha.html">ガチャ</a></li>
      <li><a href="/frontend/collection.html" class="active">カード管理</a></li>
      <li><a href="/frontend/history.html">履歴</a></li>
      <li><a href="/frontend/ranking.html">ランキング</a></li>
      <li><a href="/frontend/coins.html">コイン購入</a></li>
      <li id="nav-admin-link" class="hidden"><a href="/frontend/admin.html">管理</a></li>
    </ul>
    <div style="display: flex; align-items: center; gap: 12px;">
      <div class="coin-display hidden">
        <span id="coin-balance-display">0</span>コイン
      </div>
      <div id="nav-auth-area" style="display: flex; gap: 8px; align-items: center;"></div>
    </div>
  </nav>

  <div class="main-content">
    <div class="page-header fade-in">
      <h1>カード管理</h1>
      <p>所持カードのコイン変換・発送申請ができます</p>
    </div>

    <!-- 統計バー -->
    <div id="collection-stats" class="collection-stats fade-in">
      <div class="flex-center" style="padding: 20px;"><div class="spinner"></div></div>
    </div>

    <!-- フィルターバー -->
    <div class="collection-filter fade-in">
      <button class="filter-btn active" onclick="filterCollection('')" data-rarity="">すべて</button>
      <button class="filter-btn" onclick="filterCollection('A賞')" data-rarity="A賞">A賞</button>
      <button class="filter-btn" onclick="filterCollection('B賞')" data-rarity="B賞">B賞</button>
      <button class="filter-btn" onclick="filterCollection('C賞')" data-rarity="C賞">C賞</button>
      <button class="filter-btn" onclick="filterCollection('D賞')" data-rarity="D賞">D賞</button>
      <button class="filter-btn" onclick="filterCollection('E賞')" data-rarity="E賞">E賞</button>
    </div>

    <!-- 一括操作バー -->
    <div class="bulk-action-bar fade-in">
      <p class="bulk-count"><span id="selected-count">0</span> 枚選択中</p>
      <button class="btn btn-outline" style="padding: 6px 14px; font-size: 0.85rem;" onclick="selectAllCards()">全選択</button>
      <button class="btn btn-outline" style="padding: 6px 14px; font-size: 0.85rem;" onclick="deselectAllCards()">全解除</button>
      <button class="btn btn-primary" style="padding: 6px 14px; font-size: 0.85rem;" onclick="bulkConvertSelected()">選択をコイン変換</button>
      <button class="btn btn-outline" style="padding: 6px 14px; font-size: 0.85rem;" onclick="bulkShipSelected()">選択を発送申請</button>
      <button class="btn btn-primary" style="padding: 6px 14px; font-size: 0.85rem; background: rgba(249,217,35,0.15); color: #f9d923; border-color: #f9d923;" onclick="bulkConvertAll()">全てコイン変換</button>
      <button class="btn btn-outline" style="padding: 6px 14px; font-size: 0.85rem; color: #34d399; border-color: #34d399;" onclick="bulkShipAll()">全て発送申請</button>
    </div>

    <!-- カードグリッド -->
    <div id="collection-grid" class="collection-grid">
      <div class="flex-center" style="grid-column: 1 / -1; padding: 60px;">
        <div class="spinner"></div>
      </div>
    </div>
  </div>

  <!-- ===== コイン変換確認モーダル（単体） ===== -->
  <div id="convert-modal" style="
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9000;
    background: rgba(0,0,0,0.75);
    align-items: center;
    justify-content: center;
    padding: 16px;
  ">
    <div style="
      background: var(--card-bg, #1e1b2e);
      border: 1px solid var(--border-color, #3a3a5c);
      border-radius: 12px;
      padding: 32px 28px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
    ">
      <h2 style="font-size: 1.2rem; font-weight: 700; margin: 0 0 12px; color: var(--accent-gold, #f9d923);">コインに変換</h2>
      <p id="convert-modal-text" style="color: var(--text-secondary, #a0aec0); font-size: 0.95rem; line-height: 1.6; margin-bottom: 24px;"></p>
      <div style="display: flex; gap: 12px;">
        <button onclick="submitConvert()" class="btn btn-primary" style="flex: 1; padding: 12px;">変換する</button>
        <button onclick="closeConvertModal()" class="btn btn-outline" style="flex: 1; padding: 12px;">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- ===== 一括コイン変換確認モーダル ===== -->
  <div id="bulk-convert-modal" style="
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9000;
    background: rgba(0,0,0,0.75);
    align-items: center;
    justify-content: center;
    padding: 16px;
  ">
    <div style="
      background: var(--card-bg, #1e1b2e);
      border: 1px solid rgba(249,217,35,0.4);
      border-radius: 12px;
      padding: 32px 28px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
    ">
      <h2 style="font-size: 1.2rem; font-weight: 700; margin: 0 0 12px; color: #f9d923;">一括コイン変換</h2>
      <p id="bulk-convert-modal-text" style="color: var(--text-secondary, #a0aec0); font-size: 0.95rem; line-height: 1.6; margin-bottom: 24px;"></p>
      <div style="display: flex; gap: 12px;">
        <button onclick="submitBulkConvert()" class="btn btn-primary" style="flex: 1; padding: 12px;">変換する</button>
        <button onclick="closeBulkConvertModal()" class="btn btn-outline" style="flex: 1; padding: 12px;">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- ===== 発送申請モーダル（単体・一括共用） ===== -->
  <div id="ship-modal" style="
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9000;
    background: rgba(0,0,0,0.75);
    align-items: center;
    justify-content: center;
    padding: 16px;
    overflow-y: auto;
  ">
    <div style="
      background: var(--card-bg, #1e1b2e);
      border: 1px solid var(--border-color, #3a3a5c);
      border-radius: 12px;
      padding: 28px 24px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
      margin: auto;
    ">
      <h2 style="font-size: 1.2rem; font-weight: 700; margin: 0 0 6px;">発送申請</h2>
      <p id="ship-modal-card-name" style="color: var(--text-secondary, #a0aec0); font-size: 0.9rem; margin-bottom: 20px;"></p>

      <div id="ship-modal-alert" class="alert" style="margin-bottom: 12px;"></div>

      <!-- 住所フォーム -->
      <div class="form-group">
        <label class="form-label">氏名 *</label>
        <input type="text" id="ship-name" class="form-input" placeholder="山田 太郎">
      </div>
      <div class="form-group">
        <label class="form-label">郵便番号 *</label>
        <input type="text" id="ship-postal" class="form-input" placeholder="123-4567">
      </div>
      <div class="form-group">
        <label class="form-label">都道府県 *</label>
        <select id="ship-prefecture" class="form-input">
          <option value="">選択してください</option>
          <option>北海道</option><option>青森県</option><option>岩手県</option><option>宮城県</option>
          <option>秋田県</option><option>山形県</option><option>福島県</option><option>茨城県</option>
          <option>栃木県</option><option>群馬県</option><option>埼玉県</option><option>千葉県</option>
          <option>東京都</option><option>神奈川県</option><option>新潟県</option><option>富山県</option>
          <option>石川県</option><option>福井県</option><option>山梨県</option><option>長野県</option>
          <option>岐阜県</option><option>静岡県</option><option>愛知県</option><option>三重県</option>
          <option>滋賀県</option><option>京都府</option><option>大阪府</option><option>兵庫県</option>
          <option>奈良県</option><option>和歌山県</option><option>鳥取県</option><option>島根県</option>
          <option>岡山県</option><option>広島県</option><option>山口県</option><option>徳島県</option>
          <option>香川県</option><option>愛媛県</option><option>高知県</option><option>福岡県</option>
          <option>佐賀県</option><option>長崎県</option><option>熊本県</option><option>大分県</option>
          <option>宮崎県</option><option>鹿児島県</option><option>沖縄県</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">市区町村 *</label>
        <input type="text" id="ship-city" class="form-input" placeholder="渋谷区">
      </div>
      <div class="form-group">
        <label class="form-label">番地 *</label>
        <input type="text" id="ship-address" class="form-input" placeholder="1-2-3">
      </div>
      <div class="form-group">
        <label class="form-label">建物名（任意）</label>
        <input type="text" id="ship-building" class="form-input" placeholder="○○マンション 101号室">
      </div>
      <div class="form-group">
        <label class="form-label">電話番号 *</label>
        <input type="tel" id="ship-phone" class="form-input" placeholder="090-1234-5678">
      </div>

      <div style="display: flex; gap: 12px; margin-top: 8px;">
        <button onclick="submitShipRequest()" class="btn btn-primary" style="flex: 1; padding: 12px;">申請する</button>
        <button onclick="closeShipModal()" class="btn btn-outline" style="flex: 1; padding: 12px;">キャンセル</button>
      </div>
    </div>
  </div>

  <script src="/frontend/js/app.js"></script>
  <script src="/frontend/js/collection.js"></script>
</body>
</html>

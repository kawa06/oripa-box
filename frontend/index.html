<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>オリパガチャ - パック一覧</title>
  <link rel="stylesheet" href="/frontend/css/style.css">
</head>
<body>
  <!-- ナビゲーションバー -->
  <nav class="navbar">
    <a href="/frontend/index.html" class="navbar-brand">✦ オリパガチャ</a>
    <button class="hamburger" aria-label="メニューを開く" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <ul class="navbar-nav">
      <li><a href="/frontend/index.html" class="active">パック一覧</a></li>
      <li><a href="/frontend/gacha.html">ガチャ</a></li>
      <li><a href="/frontend/collection.html">コレクション</a></li>
      <li><a href="/frontend/history.html">履歴</a></li>
      <li><a href="/frontend/exchange.html">交換所</a></li>
      <li><a href="/frontend/ranking.html">ランキング</a></li>
      <li><a href="/frontend/coins.html">コイン購入</a></li>
      <li id="nav-admin-link" class="hidden"><a href="/frontend/admin.html">管理</a></li>
    </ul>
    <div style="display: flex; align-items: center; gap: 12px;">
      <!-- コイン残高表示 -->
      <div class="coin-display hidden">
        <span id="coin-balance-display">0</span>コイン
      </div>
      <!-- ログイン/ログアウトボタンエリア -->
      <div id="nav-auth-area" style="display: flex; gap: 8px; align-items: center;"></div>
    </div>
  </nav>

  <div class="main-content">
    <!-- ページヘッダー -->
    <div class="page-header fade-in">
      <h1>オリパガチャ</h1>
    </div>

    <!-- パック一覧 -->
    <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 24px;">
      販売中のパック
    </h2>
    <div id="pack-grid" class="pack-grid">
      <!-- JSで動的に挿入 -->
      <div class="flex-center" style="grid-column: 1 / -1; padding: 60px;">
        <div class="spinner"></div>
      </div>
    </div>

    <!-- パック一覧下のリンクエリア -->
    <div class="pack-footer-links">
      <a href="/frontend/terms.html">利用規約</a>
      <a href="/frontend/legal.html">特定商取引法に基づく表記</a>
      <a href="/frontend/privacy.html">プライバシーポリシー</a>
    </div>
  </div>

  <!-- フッター（全ページ共通） -->
  <footer class="site-footer">
    <div class="footer-links">
      <a href="/frontend/terms.html">利用規約</a>
      <a href="/frontend/legal.html">特定商取引法に基づく表記</a>
      <a href="/frontend/privacy.html">プライバシーポリシー</a>
    </div>
    <p class="footer-copy">&copy; 2025 オリパガチャ All Rights Reserved.</p>
  </footer>

  <script src="/frontend/js/app.js"></script>
  <script>
    // パック一覧を取得して表示するインラインスクリプト
    document.addEventListener('DOMContentLoaded', async () => {
      const container = document.getElementById('pack-grid');

      // 賞ごとのカラーマッピング
      const prizeColors = {
        'A賞': '#ffd700',
        'B賞': '#e879f9',
        'C賞': '#a78bfa',
        'D賞': '#38bdf8',
        'E賞': '#94a3b8',
      };

      // 賞の表示順
      const prizeOrder = ['A賞', 'B賞', 'C賞', 'D賞', 'E賞'];

      try {
        const packs = await apiGet('/packs/');

        if (packs.length === 0) {
          container.innerHTML = '<p class="text-secondary text-center" style="grid-column: 1/-1;">現在販売中のパックはありません</p>';
          return;
        }

        container.innerHTML = packs.map(pack => {
          const stockPercent = (pack.stock / pack.max_stock) * 100;
          const isLow = stockPercent < 20;

          // パック画像エリア（image_urlがあれば画像表示、なければグラデーション背景）
          const packImageHTML = pack.image_url
            ? `<img src="${pack.image_url}" alt="${pack.name}"
                   style="width: 100%; height: 100%; object-fit: cover;">`
            : `<span style="font-size: 4rem;">${getPackEmoji(pack.name)}</span>`;

          // 賞別カード画像プレビュー（各賞の代表カードを表示）
          const prizePreviewHTML = buildPrizePreview(pack.cards || [], prizeColors, prizeOrder);

          return `
            <div class="pack-card fade-in" onclick="window.location.href='/frontend/gacha.html?pack=${pack.id}'"
                 style="cursor: pointer;">
              <div class="pack-image">
                ${packImageHTML}
                ${pack.stock === 0 ? '<span class="badge-soldout">SOLD OUT</span>' : ''}
              </div>
              <div class="pack-body">
                <h3 class="pack-name">${pack.name}</h3>
                <p class="pack-description">${pack.description || ''}</p>
                <div class="stock-bar">
                  <div class="stock-bar-label">
                    <span>残り在庫</span>
                    <span>${pack.stock} / ${pack.max_stock}口 ${isLow ? '⚠️ 残りわずか' : ''}</span>
                  </div>
                  <div class="stock-bar-track">
                    <div class="stock-bar-fill ${isLow ? 'low' : ''}"
                         style="width: ${stockPercent}%"></div>
                  </div>
                </div>
              </div>
              ${prizePreviewHTML}
              <div class="pack-footer">
                <span class="price-tag">🪙 ${pack.price_coins}コイン</span>
                ${pack.stock > 0
                  ? `<a href="/frontend/gacha.html?pack=${pack.id}" class="btn btn-primary">引いてみる</a>`
                  : `<button class="btn btn-outline" disabled>売り切れ</button>`
                }
              </div>
            </div>
          `;
        }).join('');

      } catch (err) {
        container.innerHTML = `
          <div style="grid-column: 1/-1; text-align: center; color: var(--error);">
            <p>パックの読み込みに失敗しました</p>
            <p style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 8px;">${err.message}</p>
          </div>
        `;
      }
    });

    /**
     * パック名から絵文字を返す
     */
    function getPackEmoji(name) {
      if (name.includes('プレミアム')) return '💎';
      if (name.includes('限定') || name.includes('コレクション')) return '🌟';
      return '🎴';
    }

    /**
     * 賞別カードプレビューHTMLを生成する
     * 各賞の全カードを横スクロールで表示する
     * @param {Array} cards - パックのカードリスト
     * @param {Object} prizeColors - 賞ごとのカラーマップ
     * @param {Array} prizeOrder - 賞の表示順
     */
    function buildPrizePreview(cards, prizeColors, prizeOrder) {
      if (!cards || cards.length === 0) return '';

      // 各賞のカードを全件グループ化（複数対応）
      const prizeMap = {};
      prizeOrder.forEach(p => { prizeMap[p] = []; });
      for (const card of cards) {
        if (prizeMap[card.rarity]) prizeMap[card.rarity].push(card);
      }

      // 賞ごとのセクションを生成（カードがある賞のみ表示）
      const sections = prizeOrder.map(prize => {
        const prizeCards = prizeMap[prize];
        const color = prizeColors[prize] || '#666';

        // 各カードのサムネイルHTML
        const cardImgs = prizeCards.map(card => {
          return card.image_url
            ? `<img src="${card.image_url}" alt="${card.name}" class="prize-preview-img"
                    title="${card.name}" style="border-color: ${color};">`
            : `<div class="prize-preview-placeholder"
                    title="${card.name}" style="background: ${color}11; border-color: ${color}88;">
                 <span style="font-size: 0.75rem;">${prize[0]}</span>
               </div>`;
        }).join('');

        // カードが1枚もない賞はプレースホルダーを1つ表示
        const displayHtml = prizeCards.length > 0
          ? cardImgs
          : `<div class="prize-preview-placeholder"
                  style="background: ${color}11; border-color: ${color}44; opacity:0.4;">
               <span style="font-size: 0.75rem;">${prize[0]}</span>
             </div>`;

        return `
          <div class="prize-preview-section">
            <span class="prize-preview-label" style="color: ${color};">${prize}</span>
            <div class="prize-preview-imgs">${displayHtml}</div>
          </div>
        `;
      }).join('');

      return `<div class="pack-prize-preview">${sections}</div>`;
    }
  </script>
</body>
</html>
